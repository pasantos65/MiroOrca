version: "3.9"

services:

  # ── Neo4j Graph Database ───────────────────────────────────────
  neo4j:
    image: neo4j:5.15-community
    container_name: miroorca-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # Neo4j browser UI
      - "7687:7687"   # Bolt protocol (app connection)
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-miroorca}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-miroorca}", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Backend (Flask API) ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    container_name: miroorca-backend
    restart: unless-stopped
    ports:
      - "5001:5001"
    env_file:
      - .env
    environment:
      NEO4J_URI: bolt://neo4j:7687
    volumes:
      - uploads:/app/uploads
      - ./backend:/app
    depends_on:
      neo4j:
        condition: service_healthy

  # ── Frontend (Vue.js) ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    container_name: miroorca-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE_URL: http://localhost:5001
    depends_on:
      - backend

volumes:
  neo4j_data:
  neo4j_logs:
  uploads:
